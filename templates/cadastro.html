<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Criar Conta - Galeria Pro</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap"
      rel="stylesheet"
    />
    <style>
      body,
      html {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        font-family: "Inter", sans-serif;
        background-color: #000;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .login-box {
        background: #0a0a0a;
        border: 1px solid #333;
        border-radius: 12px;
        padding: 40px;
        width: 100%;
        max-width: 420px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8);
        color: white;
        text-align: center;
        box-sizing: border-box;
      }
      .login-box h2 {
        margin: 0 0 30px 0;
        font-size: 1.4rem;
        font-weight: 600;
        letter-spacing: -0.5px;
      }

      .btn-social {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        width: 100%;
        padding: 14px;
        border-radius: 50px;
        border: none;
        font-weight: 600;
        font-size: 1rem;
        cursor: pointer;
        margin-bottom: 15px;
        transition: 0.2s;
        font-family: "Inter", sans-serif;
      }
      .btn-google {
        background: white;
        color: black;
      }
      .btn-google:hover {
        background: #e5e5e5;
      }
      .btn-facebook {
        background: white;
        color: black;
      }
      .btn-facebook:hover {
        background: #e5e5e5;
      }

      .separator {
        margin: 25px 0;
        font-size: 0.85rem;
        color: #666;
        display: flex;
        align-items: center;
      }
      .separator::before,
      .separator::after {
        content: "";
        flex: 1;
        height: 1px;
        background: #333;
        margin: 0 15px;
      }

      .input-dark {
        width: 100%;
        padding: 14px 16px;
        background: #141414;
        border: 1px solid #333;
        color: white;
        border-radius: 8px;
        font-size: 0.95rem;
        box-sizing: border-box;
        margin-bottom: 15px;
        font-family: "Inter", sans-serif;
        transition: 0.2s;
      }
      .input-dark:focus {
        outline: none;
        border-color: #3b82f6;
        background: #1a1a1a;
      }

      .btn-submit {
        background: transparent;
        color: #3b82f6;
        border: none;
        font-weight: 500;
        font-size: 1rem;
        cursor: pointer;
        transition: 0.2s;
        text-decoration: none;
        padding: 5px;
      }
      .btn-submit:hover {
        color: #60a5fa;
        text-decoration: underline;
      }

      .erro-msg {
        background: rgba(239, 68, 68, 0.1);
        color: #ef4444;
        border: 1px solid rgba(239, 68, 68, 0.3);
        padding: 10px;
        border-radius: 8px;
        margin-bottom: 20px;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="login-box">
      {% with messages = get_flashed_messages() %} {% if messages %}
      <div class="erro-msg">
        {% for message in messages %} {{ message }} {% endfor %}
      </div>
      {% endif %} {% endwith %}

      <h2>Criar uma nova conta</h2>

      <button
        type="button"
        class="btn-social btn-google"
        onclick="alert('Integração com Google em breve!')"
      >
        <svg
          width="20"
          height="20"
          viewBox="0 0 24 24"
          fill="currentColor"
          style="color: #ea4335"
        >
          <path
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
          />
          <path
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
            fill="#34a853"
          />
          <path
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"
            fill="#fbbc05"
          />
          <path
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
            fill="#ea4335"
          />
        </svg>
        Cadastrar com Google
      </button>

      <button
        type="button"
        class="btn-social btn-facebook"
        onclick="alert('Integração com Facebook em breve!')"
      >
        <svg width="20" height="20" viewBox="0 0 24 24" fill="#1877F2">
          <path
            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.469h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.469h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"
          />
        </svg>
        Cadastrar com Facebook
      </button>

      <div class="separator"><span>ou use seu e-mail</span></div>

      <form action="{{ url_for('cadastro') }}" method="POST">
        <input
          type="text"
          name="nome"
          class="input-dark"
          placeholder="Seu nome completo"
          required
        />
        <input
          type="email"
          name="email"
          class="input-dark"
          placeholder="Seu melhor e-mail"
          required
        />
        <input
          type="password"
          name="senha"
          class="input-dark"
          placeholder="Crie uma senha forte"
          required
        />
        <div style="margin-top: 5px">
          <button type="submit" class="btn-submit">Criar conta</button>
          <span style="color: #444; margin: 0 10px">ou</span>
          <a href="{{ url_for('login') }}" class="btn-submit">fazer logon</a>
        </div>
      </form>

      <a
        href="{{ url_for('index') }}"
        style="
          display: block;
          margin-top: 25px;
          color: #666;
          font-size: 0.8rem;
          text-decoration: none;
        "
        >← Voltar ao Início</a
      >
    </div>
  </body>
</html>
